<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Prediction diabete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center mb-4">Système de Diagnostic Diabète</h2>
        
        <form action="/" method="POST" class="card p-4 shadow-sm">
            <div class="row">
                {% for col in columns %}
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">{{ col }}</label>
                    <input type="number" step="any" name="{{ col }}" class="form-control" required>
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-3">Prédire le diagnostic</button>
        </form>

   <div class="result-box">
    {% if predicted %}
        <div class="mt-4 p-4 text-center rounded shadow-sm bg-white border border-secondary">
            <h3 class="fw-bold">{{ prediction_text }}</h3>
        </div>
    {% endif %}
</div>
<script>
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', function() {
            let resDiv = document.querySelector('.result-box');
            if (resDiv) resDiv.style.display = 'none';
        });
    });
</script>


</body>
</html>
